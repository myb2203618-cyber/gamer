<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>
</head>
<script>
  function handleInfoInput() {
    if (infoEntity.getAttribute('visible') === false) return;
    // 1. Nhập tên
    const nameInput = prompt("Vui lòng nhập tên của bạn:");
    if (!nameInput || nameInput.trim() === "") {
      alert("Tên không được để trống!");
      return;
    }

    // 2. Nhập SĐT
    const phoneInput = prompt("Vui lòng nhập số điện thoại (10 số):");

    // Kiểm tra điều kiện
    if (phoneInput && phoneInput.length === 10) {
      userName = nameInput;
      isPhoneSubmitted = true;

      // Cập nhật text hiển thị lên không gian 3D
      nameDisplay.setAttribute('text', 'value', 'Chao: ' + userName.toUpperCase());
      phoneDisplay.setAttribute('text', 'value', 'SDT: ' + phoneInput);
      phoneDisplay.setAttribute('material', 'color', '#28a745');

      // Chạy Animation & Sound Logo
      logo.setAttribute('animation-mixer', {
        clip: '*',
        enabled: true,
        loop: 'repeat'
      });
      // Dừng nếu đang phát dở
      // Thay vì logo.components.sound.playSound()
      const s1Audio = document.getElementById('s1');
      if (s1Audio) {
        s1Audio.currentTime = 0;
        s1Audio.play();
      }

      console.log("Đã nhận thông tin:", userName, phoneInput);
    } else {
      alert("Số điện thoại không hợp lệ!");
    }
  }
  ///////////////effects
  AFRAME.registerComponent('scene-switch', {
    schema: {
      target: { type: 'selector' }
    },
    init: function () {
      this.el.addEventListener('click', () => {
        if (this.el.getAttribute('visible') === false) return;
        // Tìm scene cha hiện tại đang chứa nút được bấm
        const currentScene = this.el.closest('a-entity[id]');
        if (currentScene) currentScene.setAttribute('visible', false);

        // Hiện scene mục tiêu
        if (this.data.target) this.data.target.setAttribute('visible', true);
      });
    }
  });

  AFRAME.registerComponent('link-handler', {
    schema: { url: { type: "string" } },
    init: function () {
      this.el.addEventListener('click', () => {
        window.open(this.data.url, '_blank');
      });
    }
  });
  //////QUIZ - phancauhoi
  AFRAME.registerComponent('quiz-logic', {
    init: function () {
      // 1. Dữ liệu câu hỏi
      this.questions = [
        { qImage: "#c1", qSound: "#sc1", correct: 2 },
        { qImage: "#c2", qSound: "#sc2", correct: 0 },
        { qImage: "#c3", qSound: "#sc3", correct: 2 },
        { qImage: "#c4", qSound: "#sc4", correct: 1 },
      ];
      this.currentQuestionIndex = 0;
      this.totalQuestions = 3; // Số câu hỏi cần trả lời để qua màn
      // Trộn ngẫu nhiên danh sách câu hỏi
      this.questions = this.questions.sort(() => Math.random() - 0.5);
      // Lấy các thực thể từ HTML
      this.questionDisplay = document.querySelector("#question-board");
      // Quan trọng: Chọn tất cả các nút có class .quiz-option
      this.optionButtons = this.el.querySelectorAll(".quiz-option");
      // Gán sự kiện click cho 4 nút
      this.optionButtons.forEach((btn, index) => {
        btn.addEventListener('click', () => {
          // Chỉ xử lý click nếu Scene Quiz đang hiển thị
          if (this.el.getAttribute('visible') === true) {
            this.checkAnswer(index);
          }
        });
      });
      this.loadQuestion();
    },

    loadQuestion: function () {
      if (this.currentQuestionIndex < this.totalQuestions) {
        const currentQ = this.questions[this.currentQuestionIndex];

        // 1. Cập nhật hình ảnh
        if (this.questionDisplay) {
          this.questionDisplay.setAttribute('src', currentQ.qImage);
        }

        if (this.el.getAttribute('visible') === true) {
          const currentQ = this.questions[this.currentQuestionIndex];

          // Lấy ID âm thanh (ví dụ: "#sc1" -> "sc1")
          const audioId = currentQ.qSound.replace('#', '');
          const currentAudio = document.getElementById(audioId);

          if (currentAudio) {
            // Dừng tất cả âm thanh sc khác nếu đang phát để tránh chồng chéo
            const allVoices = ["sc1", "sc2", "sc3", "sc4"];
            allVoices.forEach(id => {
              const a = document.getElementById(id);
              if (a) { a.pause(); a.currentTime = 0; }
            });

            // Phát âm thanh câu hỏi hiện tại
            currentAudio.play().catch(e => console.log("Chờ tương tác để phát nhạc"));
          }
        }
      } else {
        // Hoàn thành: Dừng âm thanh trước khi chuyển cảnh
        if (voicePlayer && voicePlayer.components.sound) voicePlayer.components.sound.stopSound();

        this.el.setAttribute('visible', false);
        const assemblyScene = document.querySelector("#assembly");
        if (assemblyScene) {
          assemblyScene.setAttribute('visible', true);
        }
      }
    },
    checkAnswer: function (selectedIndex) {
      const currentQ = this.questions[this.currentQuestionIndex];
      // Lấy audio trực tiếp từ DOM
      const correctSound = document.querySelector("#correct");
      const wrongSound = document.querySelector("#wrong");
      if (selectedIndex === currentQ.correct) {
        // reset về đầu nếu đã phát trước đó
        correctSound.currentTime = 0;
        correctSound.play();

        setTimeout(() => {
          this.currentQuestionIndex++;
          this.loadQuestion();
        }, 800);
      } else {
        // Hiệu ứng rung nhẹ khi chọn sai
        wrongSound.currentTime = 0;
        wrongSound.play();
      }
    }
  });
  /////assembly
  // Hàm startDivingEffect cần được đặt ngoài hoặc trong một nơi mà HTML gọi được
  AFRAME.registerComponent('diving-effect', {
    init: function () {
      const product = this.el;
      const bubbles = document.getElementById('#bubbles');
      const bubbleSpheres = document.querySelectorAll('#bubbles a-sphere');
      const seaLife = document.querySelector('#sea-life');
      const light = document.querySelector('#underwater-light');
      const rewardButton = document.querySelector('#btn-get-reward');

      // Sự kiện xảy ra khi animation-mixer của sản phẩm (src="#sp") chạy xong clip
      product.addEventListener('animation-finished', () => {
        console.log("Sản phẩm đã xuất hiện xong, bắt đầu hiệu ứng lặn...");

        // 1. Hiện bong bóng và kích hoạt vọt lên
        if (bubbles) {
          bubbles.setAttribute('visible', true);
          bubbleSpheres.forEach((b) => {
            const currentPos = b.getAttribute('position');
            b.setAttribute('animation', {
              property: 'position',
              to: `${currentPos.x} 5 ${currentPos.z}`,
              dur: 800,
              loop: true,
              easing: 'easeInQuad'
            });
          });
        }
        // 2. Cho cá bơi và bật đèn 
        setTimeout(() => {
          if (seaLife) {
            seaLife.setAttribute('visible', true);
            seaLife.setAttribute('animation', {
              property: 'position',
              from: '0 -5 0',
              to: '0 0 0', // Đưa về vị trí trung tâm để bơi
              dur: 2000,
              easing: 'easeOutQuad'
            });
          }

          if (light) {
            light.setAttribute('animation__brighten', {
              property: 'light.intensity',
              to: 2.5,
              dur: 1500
            });
          }
        }, 300);

        // 3. Hiện nút nhận quà sau khi mọi thứ ổn định 
        setTimeout(() => {
          if (rewardButton) {
            rewardButton.setAttribute('visible', true);
            rewardButton.emit('show-button'); // Kích hoạt animation phóng to nút
            // Hiệu ứng nhấp nháy cho nút
            rewardButton.setAttribute('animation__pulse', {
              property: 'scale',
              from: '0.1 0.1 0.1',
              to: '0.12 0.12 0.12',
              dur: 800,
              loop: true,
              dir: 'alternate'
            });
          }
        }, 4000);
      });
      // Mồi âm thanh phần thưởng khi người dùng click vào nút nhận quà
      // âm thanh cho Scene Reward tiếp theo
      if (rewardButton) {
        rewardButton.addEventListener('click', () => {
          const rewardSound = document.querySelector("#send");
          if (rewardSound) {
            rewardSound.play().then(() => rewardSound.pause());
          }
        });
      }
    }
  });
  ////random-qua///////////////////////////////////////
  AFRAME.registerComponent('gift', {
    init: function () {
      // Lắng nghe sự kiện visible
      this.el.addEventListener('componentchanged', (evt) => {
        if (evt.detail.name === 'visible' && this.el.getAttribute('visible') === true) {
          this.generateReward();
        }
      });
    },
    generateReward: function () {
      // 1. Tính toán ngẫu nhiên
      const randomNum = Math.floor(Math.random() * 100) + 1;
      let selectedGift = "";
      if (randomNum <= 10) selectedGift = "#q4";
      else if (randomNum <= 30) selectedGift = "#q3";
      else if (randomNum <= 60) selectedGift = "#q2";
      else selectedGift = "#q1";

      const giftDisplay = document.querySelector("#gift-harec");

      if (giftDisplay) {
        // 2. Cập nhật model mới
        giftDisplay.setAttribute('src', selectedGift);

        // QUAN TRỌNG: Đợi model tải xong dữ liệu mới gán animation
        giftDisplay.addEventListener('model-loaded', () => {
          // Xóa mixer cũ để tránh xung đột
          giftDisplay.removeAttribute('animation-mixer');

          // Gán mixer mới với tên clip 
          giftDisplay.setAttribute('animation-mixer', {
            clip: 'Animation 2',
            loop: 'once',
            clampWhenFinished: true
          });
        }, { once: true });
      }
      // 3. Xử lý âm thanh
      this.playRewardSound();
      console.log("Phần quà nhận được:", selectedGift);
    },
    playRewardSound: function () {
      const sound = document.querySelector("#send");
      if (sound) {
        sound.pause(); // Dừng nếu đang chạy
        sound.currentTime = 0; // Reset về đầu

        // Sử dụng .play() của HTML5 Audio để có độ trễ thấp hơn
        sound.play().catch(err => {
          console.warn("Âm thanh bị trình duyệt chặn hoặc chưa tải xong:", err);
        });
      }
    }
  });
</script>
<title>AR Quiz 5 Scenes</title>
</head>

<body>
  <a-scene mindar-image="imageTargetSrc: targets.mind" color-space="sRGB"
    renderer="colorManagement: true; exposure: 1.2" vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-assets>
      <a-asset-item id="logo" src="asset/logo.glb"></a-asset-item>
      <a-asset-item id="logo2" src="asset/logonoa.glb"></a-asset-item>

      <a-asset-item id="start" src="asset/start.glb"></a-asset-item>
      <a-asset-item id="link" src="asset/link.glb"></a-asset-item>
      <a-asset-item id="list" src="asset/list.glb"></a-asset-item>

      <a-asset-item id="sp" src="asset/sp1.glb"></a-asset-item>

      <a-asset-item id="ans1" src="asset/a.glb"></a-asset-item>
      <a-asset-item id="ans2" src="asset/b.glb"></a-asset-item>
      <a-asset-item id="ans3" src="asset/c.glb"></a-asset-item>
      <a-asset-item id="ans4" src="asset/d.glb"></a-asset-item>

      <a-asset-item id="q1" src="asset/gift/g10.glb"></a-asset-item>
      <a-asset-item id="q2" src="asset/gift/g20.glb"></a-asset-item>
      <a-asset-item id="q3" src="asset/gift/g40.glb"></a-asset-item>
      <a-asset-item id="q4" src="asset/gift/gs.glb"></a-asset-item>

      <a-asset-item id="ray" src="asset/ray.glb"></a-asset-item>
      <a-asset-item id="la" src="asset/la.glb"></a-asset-item>

      <audio id="wrong" src="asset/audio/wrong.mp3"></audio>
      <audio id="correct" src="asset/audio/correct.mp3"></audio>
      <audio id="send" src="asset/audio/reward-end.mp3"></audio>
      <audio id="s1" src="asset/audio/chonlogo.mp3"></audio>
      <audio id="welsound" src="asset/audio/chaomung.mp3"></audio>
      <audio id="sc1" src="asset/audio/sc1.mp3"></audio>
      <audio id="sc2" src="asset/audio/sc2.mp3"></audio>
      <audio id="sc3" src="asset/audio/sc3.mp3"></audio>
      <audio id="sc4" src="asset/audio/sc4.mp3"></audio>

      <img id="c1" src="asset/ans/c1.png">
      <img id="c2" src="asset/ans/c2.png">
      <img id="c3" src="asset/ans/c3.png">
      <img id="c4" src="asset/ans/c4.png">

    </a-assets>
    <a-camera position="0 0 0" look-controls="enabled: false" cursor="fuse: false; rayOrigin: mouse;"
      raycaster="objects: .clickable"></a-camera>
    <a-entity light="type: ambient; intensity: 1"></a-entity>
    <a-entity light="type: directional; intensity: 0.8; castShadow: true" position="1 4 3"></a-entity>
    <a-entity light="type: directional; intensity: 0.5" position="-2 1 2"></a-entity>


    <a-entity mindar-image-target="targetIndex: 0">
      <a-entity id="info" visible="true">

        <a-entity class="clickable" id="logo-entity" gltf-model="#logo" position="0 0.4 0" scale="0.5 0.5 0.5"
          sound="src: #s1; autoplay: false; loop: false; volume: 1"
          animation-mixer="clip: *; loop: repeat; clampWhenFinished: true; enabled: false">
        </a-entity>
        <a-entity class="clickable" id="name-display" text="value: NHAP TEN CUA BAN; align: center; width: 2.5"
          position="0 0 0">
        </a-entity>
        <a-entity class="clickable" id="phone-display" geometry="primitive: plane; width: 1.5; height: 0.4"
          material="color: #333; opacity: 0.8" text="value: NHAP SDT NHAN QUA; align: center; width: 3"
          position="0 -0.3 0">
        </a-entity>
      </a-entity>

      <a-entity id="welcome" visible="false" sound="src: #welsound; autoplay: false; loop: false; volume: 1">

        <a-gltf-model src="#logo" position="-0.25 0.3 0" scale="0.3 0.3 0.3"
          animation-mixer="clip: *;loop: once; clampWhenFinished: true">
        </a-gltf-model>
        <a-gltf-model class="clickable" scene-switch="target: #quiz" src="#start" position="0.35 0.6 0"
          scale="0.2 0.2 0.2" rotation="0 0 0"></a-gltf-model>
        <a-gltf-model src="#link" position="0.35 0.3 0" scale="0.2 0.2 0.2" rotation="0 0 0" class="clickable"
          link-handler=" url: https://www.ctu.edu.vn/"></a-gltf-model>
        <a-gltf-model scene-switch="target: #leaderboard" src="#list" position="0.35 0 0" scale="0.2 0.2 0.2"
          rotation="0 0 0"></a-gltf-model>

      </a-entity>

      <a-entity id="leaderboard" visible="false">

        <a-text value="LEADERBOARD" align="center" position="0 0.5 0" color="yellow"></a-text>
        <a-gltf-model class="clickable" scene-switch="target: #welcome" src="#ans1" position="0 -0.5 0"
          scale="0.05 0.05 0.05"></a-gltf-model>

      </a-entity>

      <a-entity id="quiz" visible="false" quiz-logic>

        <a-plane id="question-board" position="0 0.6 0" width="1.2" height="0.6"
          material="transparent: true; shader: flat">
        </a-plane>
        <a-entity id="question-voice-player" sound="src: ; volume: 1;autoplay: false; loop: false"></a-entity>
        <a-gltf-model class="clickable quiz-option" src="#ans1" position="-0.3 0 0" scale="0.2 0.2 0.2"
          rotation="0 0 0"></a-gltf-model>
        <a-gltf-model class="clickable quiz-option" src="#ans2" position="0.3 0 0" scale="0.2 0.2 0.2"
          rotation="0 0 0"></a-gltf-model>
        <a-gltf-model class="clickable quiz-option" src="#ans3" position="-0.3 -0.2 0" scale="0.2 0.2 0.2"
          rotation="0 0 0"></a-gltf-model>
        <a-gltf-model class="clickable quiz-option" src="#ans4" position="0.3 -0.2 0" scale="0.2 0.2 0.2"
          rotation="0 0 0"></a-gltf-model>

      </a-entity>
      <!-- light -->
      <a-entity id="underwater-light" light="type: spot; color: #00e5ff; intensity: 0; penumbra: 0.5; angle: 30"
        position="2 5 -2" rotation="-70 0 0">
      </a-entity>

      <a-entity id="assembly" visible="false">
        <a-gltf-model id="main-product" src="#sp" diving-effect position="0 0 0" scale="0.2 0.2 0.2" rotation="0 180 0"
          animation-mixer="clip: *; loop: once; clampWhenFinished: true">
        </a-gltf-model>

        <a-entity id="bubbles" visible="false" position="0 0 0">
          <a-sphere color="white" opacity="0.5" radius="0.05" position="0 0 0"></a-sphere>
          <a-sphere color="white" opacity="0.4" radius="0.03" position="0.2 0 -0.1"></a-sphere>
          <a-sphere color="white" opacity="0.3" radius="0.04" position="-0.1 0 0.1"></a-sphere>
        </a-entity>

        <a-entity id="sea-life" visible="false" position="0 -5 0">
          <a-entity id="ray-pivot">
            <a-gltf-model src="#ray" position="2 0 0" rotation="0 90 0" scale="0.4 0.4 0.4"
              animation-mixer="clip:*; loop:repeat">
            </a-gltf-model>
          </a-entity>
          <a-gltf-model src="#la" position="1 0 0" scale="1 1 1"></a-gltf-model>
        </a-entity>

        <a-gltf-model id="btn-get-reward" src="#link" class="clickable" visible="false" position="0 -0.5 0.2"
          scale="0.01 0.01 0.01" scene-switch="target: #reward"
          animation__fadein="property: scale; to: 0.2 0.2 0.2; dur: 1000; easing: easeOutBack; startEvents: show-button">
        </a-gltf-model>
      </a-entity>

      <a-entity id="reward" visible="false" gift sound="src: #send; poolSize: 1; autoplay: false">

        <a-gltf-model id="gift-harec" position="0.3 0 0" scale="0.3 0.3 0.3" rotation="0 0 0">
        </a-gltf-model>

        <a-gltf-model src="#link" position="0.4 -0.5 0" scale="0.2 0.2 0.2" rotation="0 0 0" class="clickable"
          link-handler=" url: https://www.ctu.edu.vn/"></a-gltf-model>
      </a-entity>

    </a-entity>
  </a-scene>
  <script>
    const logo = document.querySelector('#logo-entity');
    const infoEntity = document.querySelector('#info');
    const welcomeEntity = document.querySelector('#welcome');
    const phoneDisplay = document.querySelector('#phone-display');
    const nameDisplay = document.querySelector('#name-display');

    let isPhoneSubmitted = false;
    let userName = ""; // Biến lưu tên người dùng
    // Sự kiện click vào vùng nhập liệu 
    phoneDisplay.addEventListener('click', handleInfoInput);
    //phoneDisplay.onClick=function(){  handleInfoInput();};
    // Sự kiện khi click vào logo để qua màn Welcome
    logo.addEventListener('click', function () {
      if (isPhoneSubmitted) {
        infoEntity.setAttribute('visible', 'false');

        welcomeEntity.setAttribute('visible', 'true');

        // // Cập nhật lời chào cá nhân hóa ở màn hình Welcome
        // const welcomeText = welcomeEntity.querySelector('[text]');
        // if (welcomeText) {
        //   welcomeText.setAttribute('text', 'value', 'CHAO MUNG ' + userName.toUpperCase() + ' DEN MANTA AR');
        // }

        // Phát âm thanh giới thiệu
        const welcomeVoice = document.querySelector('#welcome');
        if (welcomeVoice && welcomeVoice.components.sound) {
          welcomeVoice.components.sound.stopSound();
          // phát audio html5
          const welAudio = document.getElementById('welsound');
          if (welAudio) {
            welAudio.currentTime = 0;
            welAudio.play();
          }
        }
      } else {
        alert("Vui lòng nhập đầy đủ thông tin trước!");
      }
    });
  </script>
</body>

</html>

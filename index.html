<!DOCTYPE html>

<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <link rel="icon" type="image/png" sizes="16x16" href="asset/ans/logo.png">
  <meta name="msapplication-TileColor" content="#ffffff">
  <meta name="theme-color" content="#ffffff">
</head>
<script>

  const firebaseConfig = {
    apiKey: "AIzaSyAqjwgrZLbLsrySqqMqsRo1I3JldPxTX2w",
    authDomain: "csdl-harec.firebaseapp.com",
    projectId: "csdl-harec",
    storageBucket: "csdl-harec.firebasestorage.app",
    messagingSenderId: "603192476183",
    appId: "1:603192476183:web:70e7f0b1940513ff7ed252"
  };
  // khởi tạo
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  function saveUserData(name, phone, score, gift) {
    db.collection("leaderboard").add({
      name: name,
      phone: phone,
      score: score,
      gift: gift,
      createdAt: new Date()
    })
      .then(() => console.log("Lưu thành công"))
      .catch(err => console.error(err));
  }

  ///////////////effects
  AFRAME.registerComponent('scene-switch', {
    schema: {
      target: { type: 'selector' }
    },
    init: function () {
      this.el.addEventListener('click', () => {
        if (this.el.getAttribute('visible') === false) return; // Nếu chính nút này đang ẩn thì không làm gì cả
        const currentScene = this.el.closest('a-entity[id]');
        if (currentScene) { // 1. Ẩn scene hiện tại và vô hiệu hóa click
          currentScene.setAttribute('visible', false);
          const clickables = currentScene.querySelectorAll('.clickable'); // Tìm tất cả các phần tử có class clickable bên trong và đổi tên class
          clickables.forEach(el => {
            el.classList.remove('clickable');
            el.classList.add('disabled-clickable'); // Lưu tạm để bật lại nếu cần
          });
        }
        if (this.data.target) { // 2. Hiện scene mục tiêu và kích hoạt click
          this.data.target.setAttribute('visible', true);

          if (this.data.target.id === "leaderboard") {
            loadLeaderboard();
            const bck = document.getElementById('back');
            bck.setAttribute('animation', {
              property: 'position',
              to: '0 -0.5 0.3',
              dur: 200,
            });
            const ball1 = document.getElementById('ball');
            if (ball1) {
              ball1.setAttribute('visible', true);

              const bong2 = ball1.querySelectorAll('a-sphere');
              bong2.forEach((b) => {
                const startPos = b.getAttribute('position');
                b.setAttribute('animation', {
                  property: 'position',
                  to: `${startPos.x} ${startPos.y + 2} ${startPos.z}`,
                  dur: 2000 + Math.random() * 1000,
                  loop: true,
                  easing: 'linear'
                });
              });
            }
          }
          const disabledClickables = this.data.target.querySelectorAll('.disabled-clickable');
          disabledClickables.forEach(el => {
            el.classList.remove('disabled-clickable');
            el.classList.add('clickable');
          });
        }
      });
    }
  });

  function getGiftName(gift) {
    switch (gift) {
      case "q1": return "Voucher 10%";
      case "q2": return "Voucher 20%";
      case "q3": return "Voucher 40%";
      case "q4": return "Secret Mantara";
      default: return gift;
    }
  }

  function loadLeaderboard() {
    db.collection("leaderboard")
      .orderBy("score", "desc")
      .limit(5)
      .get()
      .then(snapshot => {
        const data = [];
        snapshot.forEach(doc => {
          data.push(doc.data());
        });
        renderLeaderboard(data);
      });
  }

  function renderLeaderboard(data) {
    const container = document.querySelector('#leaderboard-list');
    container.innerHTML = "";
    data.forEach((item, i) => {
      const text = document.createElement('a-text');
      text.setAttribute(
        'value',
        `${i + 1}. ${item.name} | ${item.score} score | ${getGiftName(item.gift)}`
      );
      text.setAttribute('position', `0 ${0.5 - i * 0.3} 0`);
      text.setAttribute('align', 'left');
      text.setAttribute('color', 'black');
      container.appendChild(text);
    });
  }

  AFRAME.registerComponent('link-handler', {
    schema: { url: { type: "string" } },
    init: function () {
      this.el.addEventListener('click', () => {
        window.open(this.data.url, '_blank');
      });
    }
  });

  //////QUIZ - phancauhoi
  function setModelColor(el, color) {
    const mesh = el.getObject3D('mesh');
    if (!mesh) return;

    mesh.traverse(node => {
      if (node.isMesh) {
        if (!node.userData.originalColor) { // lưu màu gốc nếu chưa có
          node.userData.originalColor = node.material.color.clone();
        }
        node.material.color.set(color);
      }
    });
  }
  function resetModelColor(el) {
    const mesh = el.getObject3D('mesh');
    if (!mesh) return;
    mesh.traverse(node => {
      if (node.isMesh && node.userData.originalColor) {
        node.material.color.copy(node.userData.originalColor);
      }
    });
  }

  ////////////////
  AFRAME.registerComponent('quiz-logic', {
    init: function () {
      this.questions = [
        { qImage: "#c1", qSound: "#sc1", correct: 2 },
        { qImage: "#c2", qSound: "#sc2", correct: 0 },
        { qImage: "#c3", qSound: "#sc3", correct: 2 },
        { qImage: "#c4", qSound: "#sc4", correct: 1 },
      ];
      this.currentQuestionIndex = 0;
      this.totalQuestions = 3;
      this.questions = this.questions.sort(() => Math.random() - 0.5);
      this.questionDisplay = document.querySelector("#question-board");
      this.optionButtons = this.el.querySelectorAll(".quiz-option");
      this.optionButtons.forEach((btn, index) => {
        btn.addEventListener('click', (evt) => {
          if (this.el.getAttribute('visible') === true) {
            this.checkAnswer(index);
          }
        });
      });
      this.el.addEventListener('componentchanged', (evt) => {    // LẮNG NGHE SỰ KIỆN: Khi màn hình Quiz hiện lên thực sự
        if (evt.detail.name === 'visible' && this.el.getAttribute('visible') === true) {
          const welAudio = document.getElementById('welsound');
          if (welAudio) {
            welAudio.currentTime = 0;
            welAudio.pause();
          }
          this.loadQuestion(); // Khi Quiz vừa hiện ra, gọi loadQuestion để phát âm thanh câu 1
        }
      });
      this.loadQuestion();
    },

    loadQuestion: function () {
      if (this.currentQuestionIndex < this.totalQuestions) {
        const currentQ = this.questions[this.currentQuestionIndex];
        if (this.questionDisplay) {                    // 1. Cập nhật hình ảnh
          this.questionDisplay.setAttribute('src', currentQ.qImage);
        }
        if (this.el.getAttribute('visible') === true) { // 2. Phát âm thanh (Chỉ chạy khi đang hiển thị)
          const audioId = currentQ.qSound.replace('#', '');
          const currentAudio = document.getElementById(audioId);
          if (currentAudio) {
            ["sc1", "sc2", "sc3", "sc4"].forEach(id => { // Dừng tất cả âm thanh câu hỏi khác
              const a = document.getElementById(id);
              if (a) { a.pause(); a.currentTime = 0; }
            });
            currentAudio.play().catch(e => console.log("Yêu cầu tương tác người dùng"));  // Phát âm thanh câu hiện tại
          }
        }
      } else {// HOÀN THÀNH QUIZ       
        ["sc1", "sc2", "sc3", "sc4"].forEach(id => {// 1. Dừng tất cả âm thanh câu hỏi
          const a = document.getElementById(id);
          if (a) { a.pause(); a.currentTime = 0; }
        });
        const hdplnt = document.getElementById('hdplant'); // 2. Chuyển cảnh
        this.el.setAttribute('visible', false);
        const plantScene = document.querySelector("#plant");
        if (plantScene) {
          plantScene.setAttribute('visible', true);
          if (hdplnt) {
            hdplnt.currentTime = 0;
            hdplnt.play();
          }
        }
      }
    },

    checkAnswer: function (selectedIndex) {
      if (this.isAnswering) return;
      const currentQ = this.questions[this.currentQuestionIndex];
      const correctSound = document.querySelector("#correct");
      const wrongSound = document.querySelector("#wrong");
      const selectedEl = this.optionButtons[selectedIndex];

      if (selectedIndex === currentQ.correct) {
        this.isAnswering = true; // chỉ khóa khi đúng
        correctSound.currentTime = 0;
        correctSound.play();
        setModelColor(selectedEl, '#00FF00');
        setTimeout(() => {
          resetModelColor(selectedEl);
          this.currentQuestionIndex++;
          this.loadQuestion();
          this.isAnswering = false;
        }, 500);

      } else {
        wrongSound.currentTime = 0;
        wrongSound.play();
        setModelColor(selectedEl, '#FF0000');
        setTimeout(() => {
          resetModelColor(selectedEl);
          this.isAnswering = false;
        }, 500);
        score--;
      }
    }
  });

  /////////////////plant
  AFRAME.registerComponent('laven', {
    init: function () {
      this.el.addEventListener('componentchanged', (evt) => {
        if (evt.detail.name === 'visible' && this.el.getAttribute('visible') === true) {
          this.laven();
        }
      });
    },

    laven: function () { // Tính toán      
      let lvndr = "";
      if (score >= 8) lvndr = "#laall";
      else if (score < 8 && score >= 6) lvndr = "#la5";
      else if (score < 6 && score >= 4) lvndr = "#la3";
      else lvndr = "#la1";
      const lvndrDisplay = document.getElementById('ln');
      if (lvndrDisplay) {
        lvndrDisplay.setAttribute('src', lvndr); // Cập nhật model mới
      }
    }
  });

  AFRAME.registerComponent('plants', {
    init: function () {
      let step = 0;
      let animationPlayed = false;
      const ln = document.getElementById('ln');
      const ch = document.getElementById('ch');
      const wt = document.getElementById('wt');
      const huong = document.getElementById('huong');
      const hit = document.getElementById('hit');
      const nut = document.getElementById('nut');
      const nuoc = document.getElementById('nuoc');
      const grow = document.getElementById('grow');
      const ssp = document.getElementById('ssp')

      const moveTo = (el, pos) => {   // Helper function để di chuyển
        el.removeAttribute('animation');  // Xóa animation cũ nếu có để tránh xung đột
        el.setAttribute('animation', {   // Thiết lập animation mới
          property: 'position',
          to: pos,
          dur: 1000,
          easing: 'easeOutQuad'
        });
      };

      ch.addEventListener('click', () => {   // 1. CLICK CHẬU
        if (step !== 0) return;
        const hdplnt = document.getElementById('hdplant');
        if (hdplnt) {
          hdplnt.pause();
          hdplnt.currentTime = 0;
        }
        moveTo(ch, '0 -0.6 0');
        if (hit) {
          hit.currentTime = 0;
          hit.play();
        }
        step = 1;
      });

      ln.addEventListener('click', () => {   // 2. CLICK LAN
        if (step === 1) {
          moveTo(ln, '0 -0.5 0');
          if (nut) {
            nut.currentTime = 0;
            nut.play();
          }
          step = 2;
          return;
        }
        if (animationPlayed) {             // Sau khi tưới nước xong (animationPlayed = true), click lan để chuyển cảnh
          const assembly = document.getElementById('assembly');
          const plant = document.getElementById('plant');
          if (plant && assembly) {
            plant.setAttribute('visible', false);
            assembly.setAttribute('visible', true);
            const mainProduct = document.querySelector("#main-product");
            if (mainProduct) {
              mainProduct.setAttribute('animation',
                {
                  property: 'scale',
                  from: '0.1 0.1 0.1',
                  to: '0.15 0.15 0.15',
                  dur: '3000'
                });
              mainProduct.setAttribute('animation-mixer', {
                clip: '*',
                loop: 'once',
                clampWhenFinished: true,
                timeScale: 1
              });
            }
            if (ssp) {
              ssp.currentTime = 0;
              ssp.play().catch(() => { });
            }
          }
        }
      });

      wt.addEventListener('click', () => { // 3. CLICK NƯỚC (WAT)
        if (step !== 2) return;
        step = 3;
        moveTo(wt, '0 0 0');
        if (nuoc) {
          nuoc.currentTime = 0;
          nuoc.play();
        }

        setTimeout(() => wt.setAttribute('visible', false), 1000);
        ln.setAttribute('animation-mixer', {
          clip: '*',
          loop: 'once',
          clampWhenFinished: true,
          timeScale: 1
        });
        if (grow) {
          grow.currentTime = 0;
          grow.play();
        }
        ln.addEventListener('animation-finished', () => {
          animationPlayed = true;
          if (huong) {
            huong.currentTime = 0;
            huong.play();
          }
        }, { once: true });
      });
    }
  });
  /////assembly
  // Hàm startDivingEffect cần được đặt ngoài hoặc trong một nơi mà HTML gọi được
  AFRAME.registerComponent('diving-effect', {
    init: function () {
      const product = this.el;
      const bubbles = document.querySelector('#bubbles');
      const seaLife = document.querySelector('#sea-life');
      const light = document.querySelector('.underwater-light');
      const rewardButton = document.querySelector('#btn-get-reward');

      product.addEventListener('animation-finished', () => {
        if (bubbles) {                            // 2. Xử lý bong bóng
          bubbles.setAttribute('visible', true);
          const spheres = bubbles.querySelectorAll('a-sphere');// Tìm tất cả sphere bên trong bubbles
          spheres.forEach((b) => {
            const startPos = b.getAttribute('position');
            b.setAttribute('animation', {
              property: 'position',
              to: `${startPos.x} ${startPos.y + 2} ${startPos.z}`,
              dur: 2000 + Math.random() * 1000,
              loop: true,
              easing: 'linear'
            });
          });
        }
        setTimeout(() => {
          if (seaLife) {
            seaLife.setAttribute('visible', true); // 3. Hiện cá và san hô (Sea Life)
          }
          light.forEach((light, i) => {
            light.setAttribute('animation__brighten', {
              property: 'light.intensity',
              to: [20][i],
              dur: 1500
            });
          });
        }, 500);
        rewardButton.setAttribute('animation', {// 4. Hiện nút nhận quà
          property: 'position',
          to: '0 -0.5 0.3',
          dur: 200,
        });
        setTimeout(() => {
          if (rewardButton) {
            rewardButton.setAttribute('visible', true);
          }
        }, 1000);
      });
      if (rewardButton) { // Sự kiện click nút nhận quà
        rewardButton.addEventListener('click', () => {
          const rewardSd = document.querySelector("#send");
          if (rewardSd) {
            rewardSd.currentTime = 0;
            rewardSd.play().catch(e => console.log("Audio play failed", e));
          }
          rewardButton.classList.remove('clickable');
        });
      }
    }
  });
  ////random-qua///////////////////////////////////////
  AFRAME.registerComponent('gift', {
    init: function () {
      this.el.addEventListener('componentchanged', (evt) => { // Lắng nghe sự kiện visible
        if (evt.detail.name === 'visible' && this.el.getAttribute('visible') === true) {
          this.generateReward();
        }
        const endlink = document.getElementById('endk');
        endlink.setAttribute('animation', {
          property: 'position',
          to: '0 -0.8 0.5',
          dur: 200,
        });
      });
    },

    generateReward: function () { // Tính toán ngẫu nhiên
      let nameGift = "";
      const randomNum = Math.floor(Math.random() * 100) + 1;
      let selectedGift = "";
      if (randomNum <= 10) { selectedGift = "#q4"; nameGift = "q4"; }
      else if (randomNum <= 30) { selectedGift = "#q3"; nameGift = "q3"; }
      else if (randomNum <= 60) { selectedGift = "#q2"; nameGift = "q2"; }
      else { selectedGift = "#q1"; nameGift = "q1"; }
      const giftDisplay = document.querySelector("#gift-harec");
      if (giftDisplay) {
        giftDisplay.setAttribute('src', selectedGift);  // Cập nhật model mới
        giftDisplay.addEventListener('model-loaded', () => { //Đợi model tải xong dữ liệu mới gán animation
          giftDisplay.removeAttribute('animation-mixer'); // Xóa mixer cũ để tránh xung đột
          giftDisplay.setAttribute('animation-mixer', { // Gán mixer mới với tên clip 
            clip: '*',
            loop: 'once',
            clampWhenFinished: true
          });
        }, { once: true });
      }
      saveUserData(userName, phoneInput, score, nameGift);
    },

  });
</script>
<title>AR Quiz 5 Scenes</title>
</head>

<body>
  <a-scene mindar-image="imageTargetSrc: targets.mind" scale="0.3 0.3 0.3" color-space="sRGB"
    renderer="colorManagement: true; exposure: 1.2" vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-assets>
      <a-asset-item id="logo" src="asset/logo.glb"></a-asset-item>
      <a-asset-item id="logo2" src="asset/logonoa.glb"></a-asset-item>

      <a-asset-item id="start" src="asset/start.glb"></a-asset-item>
      <a-asset-item id="link" src="asset/link.glb"></a-asset-item>
      <a-asset-item id="list" src="asset/list.glb"></a-asset-item>
      <a-asset-item id="gg" src="asset/ggb.glb"></a-asset-item>
      <a-asset-item id="qv" src="asset/quayve.glb"></a-asset-item>

      <a-asset-item id="sp" src="asset/sp1.glb"></a-asset-item>

      <a-asset-item id="ans1" src="asset/a.glb"></a-asset-item>
      <a-asset-item id="ans2" src="asset/b.glb"></a-asset-item>
      <a-asset-item id="ans3" src="asset/c.glb"></a-asset-item>
      <a-asset-item id="ans4" src="asset/d.glb"></a-asset-item>

      <a-asset-item id="q1" src="asset/gift/g10.glb"></a-asset-item>
      <a-asset-item id="q2" src="asset/gift/g20.glb"></a-asset-item>
      <a-asset-item id="q3" src="asset/gift/g40.glb"></a-asset-item>
      <a-asset-item id="q4" src="asset/gift/gs.glb"></a-asset-item>

      <a-asset-item id="la1" src="asset/laven/laven-1.glb"></a-asset-item>
      <a-asset-item id="la3" src="asset/laven/laven-3.glb"></a-asset-item>
      <a-asset-item id="la5" src="asset/laven/laven-5.glb"></a-asset-item>
      <a-asset-item id="laall" src="asset/laven/laven-full.glb"></a-asset-item>

      <a-asset-item id="hoa" src="asset/lavender.glb"></a-asset-item>
      <a-asset-item id="chau" src="asset/chau.glb"></a-asset-item>
      <a-asset-item id="wat" src="asset/wat.glb"></a-asset-item>

      <a-asset-item id="ray" src="asset/ray.glb"></a-asset-item>
      <a-asset-item id="la" src="asset/la.glb"></a-asset-item>
      <video id="vid" src="asset/audio/matara.webm" autoplay loop muted playsinline></video>


      <audio id="wrong" src="asset/audio/wrong.mp3"></audio>
      <audio id="correct" src="asset/audio/correct.mp3"></audio>
      <audio id="send" src="asset/audio/reward-end.mp3"></audio>
      <audio id="s1" src="asset/audio/chonlogo.mp3"></audio>
      <audio id="welsound" src="asset/audio/chaomung.mp3"></audio>
      <audio id="sc1" src="asset/audio/sc1.mp3"></audio>
      <audio id="sc2" src="asset/audio/sc2.mp3"></audio>
      <audio id="sc3" src="asset/audio/sc3.mp3"></audio>
      <audio id="sc4" src="asset/audio/sc4.mp3"></audio>
      <audio id="ssp" src="asset/audio/sptm.MP3"></audio>
      <audio id="huong" src="asset/audio/huong.mp3"></audio>
      <audio id="grow" src="asset/audio/grow.wav"></audio>
      <audio id="nut" src="asset/audio/nut.wav"></audio>
      <audio id="hit" src="asset/audio/hit.wav"></audio>
      <audio id="nuoc" src="asset/audio/nuoc.mp3"></audio>
      <audio id="hdplant" src="asset/audio/hd_plant.mp3"></audio>

      <img id="c1" src="asset/ans/c1.png">
      <img id="c2" src="asset/ans/c2.png">
      <img id="c3" src="asset/ans/c3.png">
      <img id="c4" src="asset/ans/c4.png">
      <img id="cd" src="asset/ans/cd.png" alt="">

    </a-assets>
    <a-camera position="0 0 0" look-controls="enabled: false" cursor="fuse: false; rayOrigin: mouse;"
      raycaster="objects: .clickable"></a-camera>
    <a-entity light="type: ambient; intensity: 1"></a-entity>
    <a-entity light="type: directional; intensity: 0.8; castShadow: true" position="1 4 3"></a-entity>
    <a-entity light="type: directional; intensity: 0.5" position="-2 1 2"></a-entity>


    <a-entity mindar-image-target="targetIndex: 0">
      <a-entity id="info" visible="true">

        <a-entity class="clickable" id="logo-entity" gltf-model="#logo" position="0 0.5 0.5" scale="0.6 0.6 0.6"
          sound="src: #s1; autoplay: false; loop: false; volume: 1"
          animation-mixer="clip: *; loop: repeat; clampWhenFinished: true; enabled: false">
        </a-entity>
        <a-entity class="clickable" id="name-display" geometry="primitive: plane; width: 1 ; height: 0.3"
          material="color: #333; opacity: 0.8" text="value: NHAP TEN CUA BAN; align: center; width: 2"
          position="0 -0.2 0">
        </a-entity>
        <a-entity class="clickable" id="phone-display" geometry="primitive: plane; width: 1; height: 0.3"
          material="color: #333; opacity: 0.8" text="value: NHAP SDT NHAN QUA; align: center; width: 2"
          position="0 -0.6 0">
        </a-entity>
      </a-entity>

      <a-entity id="welcome" visible="false" sound="src: #welsound; autoplay: false; loop: false; volume: 1">

        <a-video src="#vid" transparent="true" position="-0.25 0.3 0" scale="0.6 0.6 0.6"></a-video>
        </a-gltf-model>
        <a-gltf-model class="clickable" scene-switch="target: #quiz" src="#start" position="0.35 0.6 0"
          scale="0.2 0.2 0.2"></a-gltf-model>
        <a-gltf-model src="#link" position="0.35 0.3 0" scale="0.2 0.2 0.2" class="clickable"
          link-handler=" url: https://www.ctu.edu.vn/"></a-gltf-model>
        <a-gltf-model class="clickable" scene-switch="target: #leaderboard" src="#list" position="0.35 0 0"
          scale="0.2 0.2 0.2"></a-gltf-model>

  <script>
    const logo = document.querySelector('#logo-entity');
    const infoEntity = document.querySelector('#info');
    const welcomeEntity = document.querySelector('#welcome');
    const phoneDisplay = document.querySelector('#phone-display');
    const nameDisplay = document.querySelector('#name-display');

    let isHandlingInput = false;//lock
    let isPhoneSubmitted = false;
    let userName = "";
    let phoneInput = "";

    function handleInfoInput() {
      if (infoEntity.getAttribute('visible') === false) return;
      const nameInput = prompt("Vui lòng nhập tên của bạn:"); // 1. Nhập tên
      if (!nameInput || nameInput.trim() === "") {
        alert("Tên không được để trống!");
        return;
      }
      phoneInput = prompt("Vui lòng nhập số điện thoại (10 số):"); // 2. Nhập SĐT    
      if (phoneInput && phoneInput.length === 10) {  // Kiểm tra điều kiện
        userName = nameInput;
        isPhoneSubmitted = true;

        // Cập nhật text hiển thị lên không gian 3D
        nameDisplay.setAttribute('text', 'value', 'Chao: ' + userName.toUpperCase());
        phoneDisplay.setAttribute('text', 'value', 'SDT: ' + phoneInput);
        phoneDisplay.setAttribute('material', 'color', '#28a745');
        logo.setAttribute('animation-mixer', { // Chạy Animation & Sound Logo
          clip: '*',
          enabled: true,
          loop: 'repeat'
        });
        const s1Audio = document.getElementById('s1');
        if (s1Audio) {
          s1Audio.currentTime = 0;
          s1Audio.play();
        }
        console.log("Đã nhận thông tin:", userName, phoneInput);
      } else {
        alert("Số điện thoại không hợp lệ!");
      }
    }
    nameDisplay.addEventListener('click', handleInfoInput); // Sự kiện click vào vùng nhập liệu 
    phoneDisplay.addEventListener('click', handleInfoInput);
    //phoneDisplay.onClick=function(){  handleInfoInput();};

    logo.addEventListener('click', function () { // Sự kiện khi click vào logo để qua màn Welcome
      if (isPhoneSubmitted) {
        infoEntity.setAttribute('visible', 'false');
        logo.classList.remove('clickable');
        welcomeEntity.setAttribute('visible', 'true');
        const vid = document.getElementById('vid');
        const welcomeVoice = document.querySelector('#welcome');
        if (welcomeVoice && welcomeVoice.components.sound) {
          welcomeVoice.components.sound.stopSound();
          // phát audio html5
          const welAudio = document.getElementById('welsound');
          if (welAudio) {
            welAudio.currentTime = 0;
            welAudio.play();
            vid.currentTime = 0;
            vid.play();
            if (vid && welAudio) {
              //  video hết kiểm tra audio
              vid.addEventListener('ended', () => {
                if (!welAudio.ended) {
                  vid.currentTime = 0;
                  vid.play();
                }
              });
              welAudio.addEventListener('ended', () => {
                vid.pause();
                vid.currentTime = 1.3;
              });
            }
          }
        }
      } else {
        alert("Vui lòng nhập đầy đủ thông tin trước!");
      }
    });
    let score = 9;

  </script>

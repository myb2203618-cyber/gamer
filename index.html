<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>
</head>
<script>

  ///////////////effects
  AFRAME.registerComponent('scene-switch', {
    schema: {
      target: { type: 'selector' }
    },
    init: function () {
      this.el.addEventListener('click', () => {
        // Tìm scene cha hiện tại đang chứa nút được bấm
        const currentScene = this.el.closest('a-entity[id]');
        if (currentScene) currentScene.setAttribute('visible', false);

        // Hiện scene mục tiêu
        if (this.data.target) this.data.target.setAttribute('visible', true);
      });
    }
  });

  AFRAME.registerComponent('link-handler', {
    schema: { url: { type: "string" } },
    init: function () {
      this.el.addEventListener('click', () => {
        window.open(this.data.url, '_blank');
      });
    }
  });
  ////////////////////////////////////////////////////////////////
  //////QUIZ - phancauhoi
  AFRAME.registerComponent('quiz-logic', {
    init: function () {
      // 1. Dữ liệu câu hỏi
      this.questions = [
        { qImage: "#c1", correct: 3 },
        { qImage: "#c2", correct: 1 },
        { qImage: "#c3", correct: 2 },
        { qImage: "#c4", correct: 2 },
      ]
      this.currentQuestionIndex = 0;
      this.totalQuestions = 3; // Số câu hỏi cần trả lời để qua màn
      // Trộn ngẫu nhiên danh sách câu hỏi
      this.questions = this.questions.sort(() => Math.random() - 0.5);
      // Lấy các thực thể từ HTML
      this.questionDisplay = document.querySelector("#question-board");
      // Quan trọng: Chọn tất cả các nút có class .quiz-option
      this.optionButtons = this.el.querySelectorAll(".quiz-option");
      // Gán sự kiện click cho 4 nút
      this.optionButtons.forEach((btn, index) => {
        btn.addEventListener('click', () => {
          // Chỉ xử lý click nếu Scene Quiz đang hiển thị
          if (this.el.getAttribute('visible') === true) {
            this.checkAnswer(index);
          }
        });
      });
      this.loadQuestion();
    },

    loadQuestion: function () {
      // Kiểm tra nếu chưa hết số lượng câu hỏi mục tiêu
      if (this.currentQuestionIndex < this.totalQuestions) {
        const currentQ = this.questions[this.currentQuestionIndex];
        // Đổi ảnh câu hỏi trên tấm Plane
        if (this.questionDisplay) {
          this.questionDisplay.setAttribute('src', currentQ.qImage);
        }
      } else {
        // HOÀN THÀNH: Chuyển sang Scene Assembly
        this.el.setAttribute('visible', false);
        const assemblyScene = document.querySelector("#assembly");
        if (assemblyScene) {
          assemblyScene.setAttribute('visible', true);
        }
      }
    },
    checkAnswer: function (selectedIndex) {
      const currentQ = this.questions[this.currentQuestionIndex];
      // Lấy audio trực tiếp từ DOM
      const correctSound = document.querySelector("#correct");
      const wrongSound = document.querySelector("#wrong");
      if (selectedIndex === currentQ.correct) {
        console.log("Chính xác!");
        // reset về đầu nếu đã phát trước đó
        correctSound.currentTime = 0;
        correctSound.play();

        setTimeout(() => {
          this.currentQuestionIndex++;
          this.loadQuestion();
        }, 800);
      } else {
        console.log("Sai rồi! Hãy chọn lại.");
        // Hiệu ứng rung nhẹ khi chọn sai (tùy chọn)
        wrongSound.currentTime = 0;
        wrongSound.play();
      }
    }
  });

  /////assembly
  // Hàm startDivingEffect cần được đặt ngoài hoặc trong một nơi mà HTML gọi được

  AFRAME.registerComponent('diving-effect', {
    init: function () {
      this.el.addEventListener('click', () => {
        const product = this.el;
        const bubbles = document.querySelectorAll('#bubbles a-sphere');
        const seaLife = document.querySelector('#sea-life');
        const light = document.querySelector('#underwater-light');

        // 1. Tạo hiệu ứng rung cho chai nước hoa (giống như đang rơi mạnh)
        product.setAttribute('animation__shake', {
          property: 'rotation',
          from: '0 180 -1',
          to: '0 180 1',
          dur: 100,
          loop: true,
          dir: 'alternate'
        });

        // 2. Kích hoạt bong bóng vọt lên CỰC NHANH
        bubbles.forEach((b) => {
          // Lấy vị trí hiện tại của bong bóng để bắt đầu vọt lên từ đó
          const currentPos = b.getAttribute('position');
          b.setAttribute('animation', {
            property: 'position',
            from: `${currentPos.x} ${currentPos.y} ${currentPos.z}`,
            to: `${currentPos.x} 5 ${currentPos.z}`, // Vọt lên trời
            dur: 800, // Rất nhanh
            loop: true,
            easing: 'easeInQuad'
          });
        });

        // 3. Cho sinh vật biển bay lướt qua từ dưới lên
        setTimeout(() => {
          if (seaLife) {
            seaLife.setAttribute('visible', true);
            seaLife.setAttribute('animation', {
              property: 'position',
              from: '0 -5 0',
              to: '0 8 0',
              dur: 2000,
              easing: 'linear'
            });
          }

          // Bật đèn hắt sáng mạnh hơn
          if (light) {
            light.setAttribute('animation__brighten', {
              property: 'light.intensity',
              to: 2.5,
              dur: 1000
            });
          }
        }, 300);

        // 4. (Tùy chọn) Sau 4 giây, dừng rung để cảm giác đã đáp xuống đáy
        const rewardButton = document.querySelector('#btn-get-reward');

        // Sau khi lặn và cá bơi ổn định (ví dụ sau 4 giây)
        setTimeout(() => {
          if (rewardButton) {
            rewardButton.setAttribute('visible', true);
            // Kích hoạt animation phóng to nút lên
            rewardButton.emit('show-button');

            // Có thể thêm hiệu ứng nhấp nháy để thu hút sự chú ý
            rewardButton.setAttribute('animation__pulse', {
              property: 'scale',
              from: '0.1 0.1 0.1',
              to: '0.12 0.12 0.12',
              dur: 800,
              loop: true,
              dir: 'alternate'
            });
          }
        }, 5000); // 5000ms = 5 giây sau khi ấn vào chai nước hoa
      });
    }
  });
  //////////////ray
  AFRAME.registerComponent('swim-around', {
    schema: {
      target: { type: 'selector' }, // Tâm là sản phẩm
      radius: { default: 3 },      // Khoảng cách bơi
      speed: { default: 1 }        // Tốc độ bơi
    },
    tick: function (time, deltaTime) {
      // Tính toán vị trí theo hình tròn dựa trên thời gian
      const angle = time / 1000 * this.data.speed;
      const x = Math.cos(angle) * this.data.radius;
      const z = Math.sin(angle) * this.data.radius;
      const y = Math.sin(angle * 0.5) * 0.5; // Nhấp nhô lên xuống nhẹ

      // Cập nhật vị trí cho cá
      this.el.setAttribute('position', { x: x, y: y - 2, z: z });

      // Xoay đầu cá hướng theo hướng bơi
      this.el.setAttribute('rotation', { x: 0, y: -(angle * 180 / Math.PI) + 180, z: 0 });
    }
  });
  ////random-qua///////////////////////////////////////
  AFRAME.registerComponent('gift', {
    init: function () {
      // Lắng nghe sự kiện khi entity này được hiển thị (visible chuyển từ false sang true)
      this.el.addEventListener('componentchanged', (evt) => {
        if (evt.detail.name === 'visible' && this.el.getAttribute('visible') === true) {
          this.generateReward();
        }
      });
    },

    generateReward: function () {
      // 1. Định nghĩa tỉ lệ (Tổng = 100)
      // q4: 10%, q3: 20%, q2: 30%, q1: 40% (Bạn ghi nhầm hai lần q4 nên mình chỉnh lại q1 là 40%)
      const randomNum = Math.floor(Math.random() * 100) + 1; // 1 đến 100
      let selectedGift = "";

      if (randomNum <= 10) {
        selectedGift = "#q4"; // 10% (1-10)
      } else if (randomNum <= 30) {
        selectedGift = "#q3"; // 20% (11-30)
      } else if (randomNum <= 60) {
        selectedGift = "#q2"; // 30% (31-60)
      } else {
        selectedGift = "#q1"; // 40% (61-100)
      }

      // 2. Cập nhật model
      const giftDisplay = document.querySelector("#gift-harec");
      if (giftDisplay) {
        giftDisplay.setAttribute('src', selectedGift);
        // Reset lại animation để nó chạy lại từ đầu mỗi khi đổi quà
        giftDisplay.removeAttribute('animation-mixer');
        giftDisplay.setAttribute('animation-mixer', "clip: Animation 2; loop: once; clampWhenFinished: true");
      }

      // 3. Phát âm thanh "rewards"
      if (this.el.components.sound) {
        this.el.components.sound.stopSound();
        this.el.components.sound.playSound();
      }

      console.log("Phần quà may mắn nhận được:", selectedGift);
    }
  });
</script>
<title>AR Quiz 5 Scenes</title>
</head>

<body>
  <a-scene mindar-image="imageTargetSrc: targets.mind" color-space="sRGB"
    renderer="colorManagement: true; exposure: 1.2" vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-assets>
      <a-asset-item id="logo" src="asset/logo.glb"></a-asset-item>
      <a-asset-item id="logo2" src="asset/logonoa.glb"></a-asset-item>

      <a-asset-item id="start" src="asset/start.glb"></a-asset-item>
      <a-asset-item id="link" src="asset/link.glb"></a-asset-item>
      <a-asset-item id="list" src="asset/list.glb"></a-asset-item>

      <a-asset-item id="sp" src="asset/sp1.glb"></a-asset-item>

      <a-asset-item id="ans1" src="asset/a.glb"></a-asset-item>
      <a-asset-item id="ans2" src="asset/b.glb"></a-asset-item>
      <a-asset-item id="ans3" src="asset/c.glb"></a-asset-item>
      <a-asset-item id="ans4" src="asset/d.glb"></a-asset-item>

      <a-asset-item id="q1" src="asset/gift/g10.glb"></a-asset-item>
      <a-asset-item id="q2" src="asset/gift/g20.glb"></a-asset-item>
      <a-asset-item id="q3" src="asset/gift/g40.glb"></a-asset-item>
      <a-asset-item id="q4" src="asset/gift/gs.glb"></a-asset-item>

      <a-asset-item id="ray" src="asset/ray.glb"></a-asset-item>
      <a-asset-item id="la" src="asset/la.glb"></a-asset-item>

      <audio id="welsound" src="asset/audio/chaomung.mp3"></audio>
      <audio id="wrong" src="asset/audio/wrong.mp3"></audio>
      <audio id="correct" src="asset/audio/correct.mp3"></audio>
      <audio id="send" src="asset/audio/reward-end.mp3"></audio>

      <img id="c1" src="asset/ans/c1.png">
      <img id="c2" src="asset/ans/c2.png">
      <img id="c3" src="asset/ans/c3.png">
      <img id="c4" src="asset/ans/c4.png">

    </a-assets>
    <a-camera position="0 0 0" look-controls="enabled: false" cursor="fuse: false; rayOrigin: mouse;"
      raycaster="objects: .clickable:visible"></a-camera>
    <a-entity light="type: ambient; intensity: 1"></a-entity>
    <a-entity light="type: directional; intensity: 0.8; castShadow: true" position="1 4 3"></a-entity>
    <a-entity light="type: directional; intensity: 0.5" position="-2 1 2"></a-entity>


    <a-entity mindar-image-target="targetIndex: 0">

      <a-entity id="welcome" visible="true" sound="src: #welsound; autoplay: false; loop: false; volume: 1">
        
        <a-gltf-model src="#logo" position="0 0.3 0" scale="0.4 0.4 0.4"
          animation-mixer="clip: *;loop: once; clampWhenFinished: true">
        </a-gltf-model>
        <a-gltf-model class="clickable" scene-switch="target: #quiz" src="#start" position="0.5 0.6 0"
          scale="0.1 0.1 0.1" rotation="0 0 0"></a-gltf-model>
        <a-gltf-model src="#link" position="0.5 0.3 0" scale="0.1 0.1 0.1" rotation="0 0 0" class="clickable"
          link-handler=" url: https://www.ctu.edu.vn/"></a-gltf-model>
        <a-gltf-model scene-switch="target: #leaderboard" src="#list" position="0.5 0 0" scale="0.1 0.1 0.1"
          rotation="0 0 0"></a-gltf-model>

      </a-entity>

      <a-entity id="leaderboard" visible="false">
        
        <a-text value="LEADERBOARD" align="center" position="0 0.5 0" color="yellow"></a-text>
        <a-gltf-model class="clickable" scene-switch="target: #welcome" src="#ans1" position="0 -0.5 0"
          scale="0.05 0.05 0.05"></a-gltf-model>

      </a-entity>

      <a-entity id="quiz" visible="false" quiz-logic>

        <a-plane id="question-board" position="0 0.6 0" width="1.2" height="0.6"
          material="transparent: true; shader: flat">
        </a-plane>

        <a-gltf-model class="clickable quiz-option" src="#ans1" position="-0.3 0 0" scale="0.1 0.1 0.1"
          rotation="0 0 0"></a-gltf-model>
        <a-gltf-model class="clickable quiz-option" src="#ans2" position="-0.1 0 0" scale="0.1 0.1 0.1"
          rotation="0 0 0"></a-gltf-model>
        <a-gltf-model class="clickable quiz-option" src="#ans3" position="0.1 0 0" scale="0.1 0.1 0.1"
          rotation="0 0 0"></a-gltf-model>
        <a-gltf-model class="clickable quiz-option" src="#ans4" position="0.3 0 0" scale="0.1 0.1 0.1"
          rotation="0 0 0"></a-gltf-model>

      </a-entity>
      <!-- light -->
      <a-entity id="underwater-light" light="type: spot; color: #00e5ff; intensity: 0; penumbra: 0.5; angle: 30"
        position="2 5 -2" rotation="-70 0 0">
      </a-entity>

      <a-entity id="assembly" visible="false">

        <a-entity id="main-product" gltf-model="#sp" class="clickable" diving-effect position="0 0 0"
          scale="0.2 0.2 0.2" animation-mixer="clip: *;loop: once;clampWhenFinished: true" rotation=" 0 180 0">
          <a-entity id="bubbles" visible="false">
            <a-sphere color="white" opacity="0.5" radius="0.05" position="0 0 0"
              animation="property: position; to: 0.1 2 0.1; dur: 2000; loop: true; easing: linear">
            </a-sphere>
            <a-sphere color="white" opacity="0.4" radius="0.03" position="0.2 0 -0.1"
              animation="property: position; to: -0.1 2 0.2; dur: 2500; delay: 500; loop: true; easing: linear">
            </a-sphere>
            <a-sphere color="white" opacity="0.3" radius="0.04" position="-0.1 0 0.1"
              animation="property: position; to: 0 2 -0.2; dur: 1800; delay: 200; loop: true; easing: linear">
            </a-sphere>
          </a-entity>

          <a-entity id="sea-life" visible="false">
            <a-entity id="ray-pivot" position="0 -2 0"
              animation="property: rotation; to: 0 360 0; dur: 15000; easing: linear; loop: true">
              <a-gltf-model src="#ray" position="2 0 0" rotation="0 90 0" scale="0.6 0.6 0.6" animation-mixer>
              </a-gltf-model>
            </a-entity>
            <a-gltf-model src="#la" position="1 -2.5 -1" scale="0.1 0.1 0.1"></a-gltf-model>
          </a-entity>

          <a-gltf-model id="btn-get-reward" src="#link" class="clickable" visible="false" position="0 -0.5 0.2"
            scale="0.1 0.1 0.1" scene-switch="target: #reward"
            animation__fadein="property: scale; to: 0.1 0.1 0.1; dur: 1000; easing: easeOutBack; startEvents: show-button"></a-gltf-model>
        </a-entity>
      </a-entity>

      <a-entity id="reward" visible="false" gift sound="src: #send; poolSize: 1; autoplay: false">

        <a-gltf-model id="gift-harec" position="0.3 0 0" scale="0.1 0.1 0.1" rotation="0 0 0">
        </a-gltf-model>

        <a-gltf-model src="#link" position="0.5 0.3 0" scale="0.1 0.1 0.1" rotation="0 0 0" class="clickable"
          link-handler=" url: https://www.ctu.edu.vn/"></a-gltf-model>
      </a-entity>

    </a-entity>
  </a-scene>
</body>

</html>
